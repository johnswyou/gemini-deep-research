name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync deps (frozen to uv.lock)
        run: uv sync --frozen --extra dev --python ${{ matrix.python-version }}

      - name: Ruff lint
        run: uv run --python ${{ matrix.python-version }} ruff check .

      - name: Ruff format check
        run: uv run --python ${{ matrix.python-version }} ruff format --check .

      - name: Mypy (strict)
        run: uv run --python ${{ matrix.python-version }} mypy src

      - name: Pytest with coverage
        run: uv run --python ${{ matrix.python-version }} pytest -q --cov=src/gdr --cov-report=term-missing
